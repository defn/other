# Generated by defn check-fork publish (AIDR-00149). Do not hand-edit.
name: check
on:
  push:
    branches: [main]
  workflow_dispatch:
permissions:
  contents: read
jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    env:
      MISE_YES: "1"
    steps:
      - uses: actions/checkout@v4
      - name: Free disk space for bazel
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/lib/android /opt/hostedtoolcache/CodeQL /usr/local/share/boost
          sudo docker image prune --all --force || true
          df -h /
      - name: Surface the fork's mise toolset as global config
        run: |
          mkdir -p ~/.config/mise
          ln -sf "$PWD/root/.config/mise/config.toml" ~/.config/mise/config.toml
      - uses: jdx/mise-action@v2
        with:
          install: false
      - name: Install tools (best-effort; some pinned CLIs are pruned upstream and aren't needed for check)
        run: mise install --yes || true
      - name: hatch
        run: mise run hatch
      - name: check
        run: mise run check
