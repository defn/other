# Generated by defn check-fork publish (AIDR-00149). Do not hand-edit.
name: check
on:
  push:
    branches: [main]
  workflow_dispatch:
permissions:
  contents: read
jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    env:
      MISE_YES: "1"
    steps:
      - uses: actions/checkout@v4
      - name: Free disk space for bazel
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/lib/android /opt/hostedtoolcache/CodeQL /usr/local/share/boost
          sudo docker image prune --all --force || true
          df -h /
      - uses: jdx/mise-action@v2
      - name: hatch (regenerate seed outputs for this fork's tenant set)
        run: mise run hatch
      - name: check
        run: mise run check
