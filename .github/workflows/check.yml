# Generated by defn check-fork publish (AIDR-00149). Do not hand-edit.
# Hardened per GitHub Actions security guidance: actions pinned to full
# commit SHA, read-only token, no pull_request trigger (so fork PRs can't
# auto-run or poison the cache), concurrency cancellation.
name: check
on:
  push:
    branches: [main]
  workflow_dispatch:
permissions:
  contents: read
concurrency:
  group: check-${{ github.ref }}
  cancel-in-progress: true
jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    env:
      MISE_YES: "1"
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Free disk space for bazel
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/lib/android /opt/hostedtoolcache/CodeQL /usr/local/share/boost
          sudo docker image prune --all --force || true
          df -h /
      - name: Surface the fork's mise toolset as global config
        run: |
          mkdir -p ~/.config/mise
          ln -sf "$PWD/m/root/.config/mise/config.toml" ~/.config/mise/config.toml
      - name: Generate machine-specific .bazelrc.workspace for this runner
        working-directory: m
        run: ./bin/bootstrap-bazelrc
      - uses: jdx/mise-action@c37c93293d6b742fc901e1406b8f764f6fb19dac # v2
        with:
          working_directory: m
      - name: Put mise binary on the bazel action PATH (~/.local/bin)
        run: |
          mkdir -p ~/.local/bin
          ln -sf "$(command -v mise)" ~/.local/bin/mise
          ~/.local/bin/mise --version
      - name: Trust fork mise configs (persistent; survives bazel-runner env -i)
        working-directory: m
        run: |
          mise trust --quiet ~/.config/mise/config.toml
          mise trust --quiet "$PWD/mise.toml"
          for f in $(find . -name mise.toml -not -path '*/bazel-*'); do mise trust --quiet "$f" || true; done
      - name: hatch
        working-directory: m
        run: mise run hatch
      - name: check
        working-directory: m
        # --ignore-unclean-workarea: a fresh fork regenerates volatile var/
        # gen outputs (machine-specific lattice); the clean assertion below
        # then verifies nothing OUTSIDE var/ drifted (the real portability bar).
        run: mise run check -- --ignore-unclean-workarea
      - name: Assert workspace clean outside volatile var/
        working-directory: m
        run: |
          root="$(git rev-parse --show-toplevel)"
          dirty="$(git -C "$root" status --porcelain | grep -vE ' m/var/' || true)"
          if [ -n "$dirty" ]; then
            echo "Unexpected changes outside var/ -- portability defect:"; echo "$dirty"; exit 1
          fi
          echo "clean outside var/ (var/ is volatile-by-design, AIDR-00145)"
