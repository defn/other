# Generated by defn gen from schema/versions.cue.
# DO NOT EDIT -- edit schema/versions.cue and run `mise run gen`.

[settings]
experimental = true

[settings.python]
compile = false

[tools]

# Shell prompt
starship = "1.25.1"

# Bazel -- managed via bazelisk
# Actual Bazel version is in .bazelversion (9.1.0)
bazelisk = "1.29.0"

# Go toolchain
go = "1.26.3"

# CUE language toolchain
cue = "0.17.0-alpha.1"

# Python toolchain
# FROZEN at 3.14.2: rules_python 2.0.2 supports 3.14.4, but mise 2026.3.9 mis-installs it (freethreaded-stripped asset, missing lib/). Unfreeze in sync-module-versions.clj once mise is fixed. See ~/TODO.md.
python = "3.14.2"

# Scripting
# babashka (bb) for all scripts via bbs wrapper
babashka = "1.12.218"
# Go interpreter for scripts; use bin/yae shebang wrapper
"go:github.com/traefik/yaegi/cmd/yaegi" = "0.16.1"

# JavaScript/Node.js
# LTS only (even-numbered); must be available in rules_nodejs for linux_arm64
node = "24.14.1"
# must sync with package.json packageManager or pnpm reinstalls endlessly
pnpm = "10.33.2"

# Java (GraalVM CE -- includes native-image for AOT compilation)
java = "graalvm-community-25.0.2"
maven = "3.9.16"

# Formatters
biome = "2.4.15"
buildifier = "8.5.1"
# cljstyle: managed as JAR via m/bin/cljstyle (no linux-arm64 native binary)
ruff = "0.15.14"
"github:mvdan/sh" = "3.13.1"
dprint = "0.54.0"
opentofu = "1.12.0"
packer = "1.15.3"
prettier = "3.8.3"
taplo = "0.10.0"

# Package managers
# pinned to match rules_uv 0.89.2 bundled version
uv = "0.8.12"
pipx = "1.12.0"

# CLI tools
aws = "2.34.53"
ansible = "13.7.0"
coder = "2.33.6"
gh = "2.92.0"
jq = "1.8.1"
k3d = "5.8.3"
yq = "4.53.2"
"aqua:tailscale/tailscale" = "1.98.2"

# Services
"github:coder/code-server" = { version = "4.121.0", bin_path = "bin", extract_all = "true" }

# Container tools
# max version supported by rules_oci 2.3.0
"github:google/go-containerregistry" = { version = "v0.18.0", exe = "crane" }
# max version supported by rules_oci 2.3.0
"github:regclient/regclient" = { version = "v0.8.0", exe = "regctl" }
trufflehog = "3.95.3"

# Kubernetes / GitOps
argocd = "3.4.2"
helm = "4.2.0"
# k3kcli (raw-binary github release; user-facing verb `k3k` provided by m/bin/k3k shim)
"github:rancher/k3k" = { version = "v1.1.0-rc6", matching = "k3kcli" }
kube-controller-tools = "0.21.0"
kustomize = "5.8.1"

# Interactive CLI tools
bat = "0.26.1"
difftastic = "0.69.0"
fzf = "0.73.1"
glow = "2.1.2"

# AI tools
"npm:@anthropic-ai/claude-code" = "2.1.150"
# ACP bridge for `defn dispatch --acp-prompt`
"npm:@zed-industries/claude-agent-acp" = "0.23.1"
opencode = "1.15.10"

# Protobuf tools
buf = "1.69.0"
protoc = "35.0"

# Job queue tools
"go:github.com/riverqueue/river/cmd/river" = "0.38.0"

# CI tools
"github:buildkite/cli" = "3.42.0"
"github:buildkite/agent" = "3.127.0"
git-lfs = "3.7.1"

# CI tools
"aqua:jdx/pitchfork" = "2.11.0"
"github:always-further/nono" = "v0.53.0"
